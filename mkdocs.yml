site_name: Phidler
site_description: Graphical CAD application for photonic integrated circuit layout, built on gdsfactory.
docs_dir: docs

theme:
  name: material
  palette:
    # Light/dark toggle (the readthedocs theme had no dark mode). Follows the
    # OS preference by default; the header icon switches it manually.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Tutorial — Designing an MZI: tutorial.md
  - User Guide: guide.md
  - Development: development.md

hooks:
  - docs/hooks.py

markdown_extensions:
  - tables
  - fenced_code
  - toc
