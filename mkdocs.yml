site_name: Phidler
site_description: Graphical CAD application for photonic integrated circuit layout, built on gdsfactory.
docs_dir: docs

theme:
  name: readthedocs
  highlightjs: true

nav:
  - Home: index.md
  - Feature Tour: tour.md
  - Tutorial — Designing an MZI: tutorial.md
  - User Guide: guide.md
  - Keyboard Shortcuts: shortcuts.md
  - FAQ & Troubleshooting: faq.md
  - Development: development.md

hooks:
  - docs/hooks.py

markdown_extensions:
  - tables
  - fenced_code
  - toc
