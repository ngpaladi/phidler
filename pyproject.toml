[project]
name = "phidler"
version = "0.1.0"
description = "Graphical CAD application for photonic integrated circuit layout, built on gdsfactory"
requires-python = ">=3.10"
dependencies = [
    "gdsfactory>=9.44.0",
    "PySide6>=6.7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]
docs = [
    "mkdocs>=1.6.0",
]
# photonfdtd isn't published on PyPI yet (sibling project, not a Phidler
# package) — install it from its own checkout first
# (pip install -e /path/to/photonfdtd), then this version constraint will
# already be satisfied and `pip install -e ".[fdtd]"` won't need network
# access for it. Phidler tracks photonfdtd 0.2.x (CuPy GPU backend).
fdtd = [
    "photonfdtd>=0.2.0",
    "matplotlib>=3.7",
    # Numba JIT-compiles photonfdtd's field-update kernel (parallel, cached to
    # disk) — ~5x faster than the plain NumPy engine and, unlike the CuPy GPU
    # backend, runs in the worker thread so the UI stays responsive. Enabled by
    # default when importable.
    "numba>=0.59",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = [
    # A few generic-PDK components (coupler_bend, coupler_ring_bend,
    # ring_double_bend_coupler) build valid sub-90° euler bends, which makes
    # gdsfactory's bend_euler nag. The components are fine — silence just this
    # message here too (the app filters it in activate_pdk, but pytest manages
    # its own warning-filter stack and resets that one).
    "ignore:bend_euler angle should be 90 or 180:UserWarning",
]
